services:

  # ── Application ──────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: kinderuniversiteit-ai:latest
    container_name: kinderuniversiteit-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      # Override connection strings so they point to service names on the
      # internal Docker network, regardless of what .env says.
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-kinderuniversiteit}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      CHROMA_HOST: chromadb
      # ChromaDB container exposes port 8000 internally (mapped to host 8001).
      CHROMA_PORT: "8000"
      APP_ENV: ${APP_ENV:-production}
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # ── Database migrations (run once, then exit) ─────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: kinderuniversiteit-ai:latest
    container_name: kinderuniversiteit-migrate
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-kinderuniversiteit}
    command: ["python", "-m", "alembic", "-c", "alembic/alembic.ini", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: "no"

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: kinderuniversiteit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kinderuniversiteit}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    ports:
      - "5432:5432"   # expose for local tooling; remove in hardened deployments
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB:-kinderuniversiteit}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: kinderuniversiteit-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - internal
    ports:
      - "6379:6379"   # expose for local tooling; remove in hardened deployments
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── ChromaDB ──────────────────────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: kinderuniversiteit-chromadb
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - internal
    ports:
      - "8001:8000"   # host:8001 → container:8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  app_data:
  app_logs:
