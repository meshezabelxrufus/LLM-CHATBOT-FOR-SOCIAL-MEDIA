services:
  - type: web
    name: kinderuniversiteit-backend
    env: python
    plan: free
    rootDir: kinderuniversiteit
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: APP_ENV
        value: development
      - key: FRONTEND_URL
        value: https://demo-frontend-3m8mzjxtl-meshezabel92-8290s-projects.vercel.app
      - key: SECRET_KEY
        generateValue: true
      - key: AI_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        value: "SET_IN_DASHBOARD"
      - key: OPENAI_MODEL
        value: "gpt-4o-mini"
      - key: ANONYMIZED_TELEMETRY
        value: "False"
