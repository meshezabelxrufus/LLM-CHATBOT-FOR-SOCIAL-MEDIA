services:
  - type: web
    name: kinderuniversiteit-backend
    env: python
    plan: free
    rootDir: kinderuniversiteit
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
