services:
  - type: web
    name: kinderuniversiteit-backend
    env: python
    plan: free
    rootDir: kinderuniversiteit
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: FRONTEND_URL
        value: https://demo-frontend-3m8mzjxtl-meshezabel92-8290s-projects.vercel.app
